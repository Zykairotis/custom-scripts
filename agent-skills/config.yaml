# ─────────────────────────────────────────────────────────────────────────────
# AUTH STEPS (printed as reminders after install)
# ─────────────────────────────────────────────────────────────────────────────
auth_steps:
  - cmd: "parallel-cli login"
    skills: [parallel-web-search, parallel-web-extract, parallel-deep-research, parallel-data-enrichment]
    note: "Or set PARALLEL_API_KEY instead"
  - cmd: "gh auth login"
    skills: [yeet, finishing-a-development-branch, commit-security-scan, github]
  - cmd: "vercel login && vercel link"
    skills: [vercel-cli, deployments-cicd, env-vars, bootstrap]
  - cmd: "aws configure"
    skills: [aws]
    note: "Or use: aws sso login"
  - cmd: "az login"
    skills: [azure]
  - cmd: "gcloud auth login && gcloud auth application-default login"
    skills: [gcp]
  - cmd: "huggingface-cli login"
    skills: [llm-finetuning]
  - cmd: "turbo login && turbo link"
    skills: [turborepo]
  - cmd: "sentry-cli login"
    skills: [sentry]
    note: "Or set SENTRY_AUTH_TOKEN instead"

# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME REQUIREMENTS (external services that must be running)
# ─────────────────────────────────────────────────────────────────────────────
runtime_requirements:
  - name: "Termdock on port 3033"
    skills: [termdock-ast]
  - name: "SearXNG instance"
    skills: [searxng]
    note: "Set SEARXNG_URL to your instance"
  - name: "Kubernetes cluster + kubeconfig"
    skills: [kubernetes, helm]
  - name: "Google OAuth connector"
    skills: [google-docs, google-drive, google-sheets, google-slides]
    note: "Authorize Google account in your agent runtime"
  - name: "Jira integration connector"
    skills: [jira]
  - name: "Notion integration token"
    skills: [notion]
    note: "Create at https://www.notion.so/my-integrations"
  - name: "macOS Screen Recording permission"
    skills: [screenshot]
    os: [macos]
  - name: "js_repl + --sandbox danger-full-access"
    skills: [playwright-interactive]
    note: "Enable js_repl in ~/.codex/config.toml"
