    secret: true
    get_from: "https://api.slack.com/apps → Basic Information"

  DISCORD_BOT_TOKEN:
    skills: [chat-sdk]
    required: false
    secret: true
    get_from: "https://discord.com/developers/applications → Bot → Token"

